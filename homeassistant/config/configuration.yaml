# ═══════════════════════════════════════════════════════════════════════════
#  homewatch — configuración de Home Assistant
#  Este archivo arranca SIN errores. Lo avanzado (MQTT, alertas, cámaras)
#  se activa después siguiendo los pasos comentados más abajo.
# ═══════════════════════════════════════════════════════════════════════════

homeassistant:
  name: homewatch
  unit_system: metric
  time_zone: America/Santiago
  currency: CLP

# Componentes por defecto (interfaz, mapa, energía, etc.)
default_config:

# HTTP — necesario para acceso remoto vía Cloudflare Tunnel
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.16.0.0/12      # red interna de Docker
    - 127.0.0.1

# Logs
logger:
  default: warning
  logs:
    homeassistant.components.frigate: info

# Historial de sensores
recorder:
  purge_keep_days: 30

# ═══════════════════════════════════════════════════════════════════════════
#  PASO 1 — Conectar MQTT (después de terminar el onboarding)
# ═══════════════════════════════════════════════════════════════════════════
#  MQTT ya NO se configura en este archivo. Hazlo desde la interfaz:
#
#    Ajustes → Dispositivos y servicios → Añadir integración → MQTT
#      Broker:   mosquitto
#      Puerto:   1883
#      Usuario:  frigate
#      Password: frigate_pass
#
# ═══════════════════════════════════════════════════════════════════════════
#  PASO 2 — Instalar la integración de Frigate
# ═══════════════════════════════════════════════════════════════════════════
#    Ajustes → Dispositivos y servicios → Añadir integración → Frigate
#      URL: http://frigate:5000
#
#    (Si no aparece, instala primero HACS: https://hacs.xyz)
#
# ═══════════════════════════════════════════════════════════════════════════
#  PASO 3 — Instalar la app "Home Assistant" en tu celular
# ═══════════════════════════════════════════════════════════════════════════
#    Descárgala de Play Store / App Store, inicia sesión, y quedará
#    disponible el servicio de notificaciones push (notify.mobile_app_*).
#
