# Auto-generated by homewatch/scripts/generate_config.sh
# Hardware: Intel(R) Core(TM) 7 240H | RAM: 61,2GB | Detector: NVIDIA TensorRT (NVIDIA GeForce RTX 5060 Laptop GPU)

mqtt:
  host: mosquitto
  port: 1883
  user: frigate
  password: frigate_pass

database:
  path: /data/frigate.db

# ── Detector ─────────────────────────────────────────────────────────────────
detectors:
  tensorrt:
    type: tensorrt
    device: 0

# ── FFMPEG ───────────────────────────────────────────────────────────────────
ffmpeg:
  hwaccel_args: preset-nvidia-h264
  output_args:
    record: preset-record-generic-audio-copy

# ── Snapshots globales ────────────────────────────────────────────────────────
snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 30

# ── Grabación ─────────────────────────────────────────────────────────────────
record:
  enabled: true
  retain:
    days: 30
    mode: motion           # graba solo cuando hay movimiento (ahorra espacio)
  events:
    retain:
      default: 30
      mode: active_objects # retiene más tiempo si hay objeto detectado

# ── Detección de objetos ──────────────────────────────────────────────────────
objects:
  track:
    - person
    - car
    - truck
    - motorcycle
    - bicycle
    - dog
    - cat
  filters:
    person:
      min_area: 2000       # ignora detecciones muy pequeñas (ruido)
      min_score: 0.6
      threshold: 0.7
    car:
      min_area: 5000
      min_score: 0.6

# ── Cámaras ───────────────────────────────────────────────────────────────────
# Agrega tus cámaras aquí. Ejemplo con cámara RTSP genérica:
#
# cameras:
#   entrada:
#     ffmpeg:
#       inputs:
#         - path: rtsp://usuario:password@192.168.1.100:554/stream1
#           roles:
#             - detect
#             - record
#     detect:
#       width: 1280
#       height: 720
#       fps: 5
#     zones:
#       zona_entrada:
#         coordinates: 0,720,640,720,640,0,0,0   # polígono de la zona
#         objects:
#           - person
#
# Para descubrir cámaras ONVIF en tu red ejecuta:
#   docker exec frigate frigate onvif-discover

# ── Interfaz web ──────────────────────────────────────────────────────────────
ui:
  live_mode: mse
  timezone: America/Santiago

