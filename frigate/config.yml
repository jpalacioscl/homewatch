# Auto-generated by homewatch/scripts/generate_config.sh
# Hardware: Intel(R) Core(TM) 7 240H | RAM: 61,2GB | Detector: NVIDIA ONNX/CUDA (NVIDIA GeForce RTX 5060 Laptop GPU)

mqtt:
  host: mosquitto
  port: 1883
  user: frigate
  password: frigate_pass

database:
  path: /data/frigate.db

# ── Detector ─────────────────────────────────────────────────────────────────
detectors:
  onnx:
    type: onnx
    device: cuda

# ── FFMPEG ───────────────────────────────────────────────────────────────────
ffmpeg:
  hwaccel_args: preset-nvidia-h264
  output_args:
    record: preset-record-generic-audio-copy

# ── Snapshots globales ────────────────────────────────────────────────────────
snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 30

# ── Grabación ─────────────────────────────────────────────────────────────────
record:
  enabled: true
  alerts:
    retain:
      days: 30
  detections:
    retain:
      days: 30
  continuous:
    days: 0
  motion:
    days: 30
objects:
  track:
    - person
    - car
    - truck
    - motorcycle
    - bicycle
    - dog
    - cat
  filters:
    person:
      min_area: 2000       # ignora detecciones muy pequeñas (ruido)
      min_score: 0.6
      threshold: 0.7
    car:
      min_area: 5000
      min_score: 0.6

# ── Cámaras ───────────────────────────────────────────────────────────────────
# Frigate requiere al menos una cámara. Esta es una cámara de ejemplo
# deshabilitada. Reemplaza los valores con los de tu cámara real,
# o ejecuta: bash scripts/scan_cameras.py  para detectarlas automáticamente.
cameras:
  mi_camara:
    enabled: false          # cambia a true cuando tengas los datos correctos
    ffmpeg:
      inputs:
        - path: rtsp://usuario:password@192.168.1.100:554/stream1
          roles:
            - detect
            - record
    detect:
      width: 1280
      height: 720
      fps: 5
    # zones:
    #   zona_entrada:
    #     coordinates: 0,720,1280,720,1280,0,0,0
    #     objects:
    #       - person

# ── Interfaz web ──────────────────────────────────────────────────────────────
ui:
  timezone: America/Santiago

version: 0.17-0
